<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Générateur SMS &amp; Mail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--c-bg);color:var(--c-text);-webkit-font-smoothing:antialiased;height:100%;}
  ::selection{background:oklch(0.9 0.06 266);}
  @keyframes flyUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes popIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}
  .ag-depasse{animation:blink 1.4s ease-in-out infinite;}
  @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
  #stat-tooltip{position:fixed;z-index:300;pointer-events:none;padding:7px 11px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;background:oklch(0.22 0.02 264 / .95);box-shadow:0 4px 18px oklch(0.1 0.02 264 / .35);white-space:nowrap;display:none;max-width:240px;white-space:normal;line-height:1.4;}
  .gx-scroll::-webkit-scrollbar{width:9px;height:9px;}
  .gx-scroll::-webkit-scrollbar-thumb{background:oklch(0.86 0.01 256);border-radius:9px;border:2px solid transparent;background-clip:padding-box;}
  .gx-scroll::-webkit-scrollbar-thumb:hover{background:oklch(0.78 0.015 256);background-clip:padding-box;}
  .gx-in{transition:border-color .18s,box-shadow .18s,background .18s;}
  .gx-in:hover{border-color:oklch(0.8 0.02 264)!important;}
  .gx-in:focus{outline:none;border-color:oklch(0.55 0.16 266)!important;box-shadow:0 0 0 4px oklch(0.55 0.16 266 / .13)!important;}
  .gx-press{transition:transform .12s cubic-bezier(.34,1.4,.64,1),box-shadow .2s,background .2s,color .2s,border-color .2s;}
  .gx-press:active{transform:scale(.97);}
  .gx-lift{transition:transform .18s,box-shadow .2s,border-color .18s;}
  .gx-lift:hover{transform:translateY(-2px);}
  .gx-card{animation:flyUp .4s cubic-bezier(.2,.7,.3,1) both;}
  button{font-family:inherit;}

  /* ===== MANDAT DOCUMENT ===== */
  #mandat-doc{background:#fff;color:#1a1a1a;font-family:'Plus Jakarta Sans',serif;}
  #mandat-doc .m-page{max-width:780px;margin:0 auto;padding:38px 46px;}
  #mandat-doc h1{font-size:17px;font-weight:800;line-height:1.35;margin:0 0 4px;}
  #mandat-doc p{font-size:12.5px;line-height:1.6;margin:0 0 11px;text-align:justify;}
  #mandat-doc ul{margin:0 0 12px;padding-left:18px;}
  #mandat-doc li{font-size:12px;line-height:1.55;margin-bottom:3px;}
  #mandat-doc .m-logo{display:flex;align-items:center;gap:12px;margin-bottom:22px;border-bottom:2px solid #2f3a8f;padding-bottom:14px;}
  #mandat-doc .m-logo .m-mark{width:46px;height:46px;border-radius:11px;background:linear-gradient(145deg,#3949ab,#283593);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;flex-shrink:0;}
  #mandat-doc .m-logo .m-brand{font-weight:800;font-size:15px;color:#283593;letter-spacing:-.01em;}
  #mandat-doc .m-logo .m-sub{font-size:11px;color:#666;font-weight:500;}
  #mandat-doc .m-sign{display:flex;justify-content:space-between;margin-top:34px;font-size:12.5px;}
  #mandat-doc .m-sign div{width:46%;}
  #mandat-doc .m-sign .m-line{margin-top:46px;border-top:1px solid #999;}

  /* ===== RESPONSIVE GLOBAL ===== */
  .gen-grid{display:flex;flex-direction:column;gap:20px;max-width:1180px;margin:0 auto;padding:clamp(14px,3vw,32px) clamp(12px,4vw,40px);}
  @media(min-width:720px){.gen-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,420px);gap:28px;align-items:start;}}
  .gen-preview{position:static;}
  @media(min-width:720px){.gen-preview{position:sticky;top:136px;}}
  .gen-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  @media(min-width:420px){.gen-type-grid{grid-template-columns:1fr 1fr 1fr;}}
  .gen-row1{display:grid;grid-template-columns:80px 1fr;gap:9px;}
  @media(min-width:400px){.gen-row1{grid-template-columns:80px 1fr 1fr;}}
  .mandat-grid{display:flex;flex-direction:column;gap:20px;max-width:1180px;margin:0 auto;padding:clamp(14px,3vw,32px) clamp(12px,4vw,40px);}
  @media(min-width:720px){.mandat-grid{display:grid;grid-template-columns:minmax(0,380px) minmax(0,1fr);gap:28px;align-items:start;}}
  /* ===== STATS RESPONSIVE ===== */
  .stats-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
  @media(min-width:480px){.stats-kpi{grid-template-columns:repeat(auto-fit,minmax(110px,1fr));}}
  .stats-grid{display:flex;flex-direction:column;gap:16px;margin-bottom:16px;}
  @media(min-width:640px){.stats-grid{display:grid;grid-template-columns:1fr 1fr;}}
  .stats-bar-label{font-size:11px;font-weight:600;flex-shrink:0;width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--c-dim);}
  @media(min-width:400px){.stats-bar-label{width:90px;font-size:12px;}}
  .stats-bar-val{font-size:11px;font-weight:700;flex-shrink:0;text-align:right;}
  @media(min-width:400px){.stats-bar-val{font-size:12px;}}

  .mandat-row1{display:grid;grid-template-columns:90px 1fr;gap:9px;}
  .hdr-btn{cursor:pointer;font-family:inherit;font-weight:600;font-size:11px;padding:7px 10px;border-radius:11px;white-space:nowrap;}
  @media(min-width:480px){.hdr-btn{font-size:13px;padding:9px 15px;}}
  .tab-pane-inner{max-width:1180px;margin:0 auto;padding:clamp(14px,3vw,32px) clamp(12px,4vw,40px);}

  /* ===== DARK MODE ===== */
  :root{
    --c-bg:oklch(0.968 0.008 256);--c-card:#fff;--c-input:#fff;
    --c-border:oklch(0.92 0.008 256);--c-border-in:oklch(0.89 0.01 256);
    --c-text:oklch(0.26 0.03 264);--c-muted:oklch(0.6 0.02 264);
    --c-subtle:oklch(0.55 0.02 264);--c-dim:oklch(0.5 0.02 264);
    --c-header:oklch(0.985 0.004 256 / .82);--c-nav:#fff;--c-border-ch:oklch(0.91 0.01 256);
    --c-hover:oklch(0.94 0.006 256);--c-subtle-bg:oklch(0.97 0.005 256);
  }
  [data-theme="dark"]{
    --c-bg:oklch(0.13 0.015 264);--c-card:oklch(0.19 0.015 264);--c-input:oklch(0.23 0.015 264);
    --c-border:oklch(0.3 0.015 264);--c-border-in:oklch(0.33 0.015 264);
    --c-text:oklch(0.92 0.008 264);--c-muted:oklch(0.65 0.015 264);
    --c-subtle:oklch(0.62 0.015 264);--c-dim:oklch(0.72 0.015 264);
    --c-header:oklch(0.14 0.015 264 / .95);--c-nav:oklch(0.17 0.015 264);--c-border-ch:oklch(0.35 0.015 264);
    --c-hover:oklch(0.25 0.015 264);--c-subtle-bg:oklch(0.22 0.015 264);
  }
  /* éléments statiques */
  [data-theme="dark"] body{background:var(--c-bg)!important;color:var(--c-text)!important;}
  [data-theme="dark"] header{background:var(--c-header)!important;border-color:var(--c-border)!important;}
  [data-theme="dark"] #tabnav{background:var(--c-nav)!important;border-color:var(--c-border)!important;}
  /* surcharges inline */
  [data-theme="dark"] [style*="background:var(--c-card)"]{background:var(--c-card)!important;}
  [data-theme="dark"] [style*="color:var(--c-muted)"]{color:var(--c-muted)!important;}
  [data-theme="dark"] [style*="color:var(--c-subtle)"]{color:var(--c-subtle)!important;}
  [data-theme="dark"] [style*="color:var(--c-subtle)"]{color:var(--c-subtle)!important;}
  [data-theme="dark"] [style*="color:var(--c-muted)"]{color:var(--c-muted)!important;}
  [data-theme="dark"] [style*="color:var(--c-dim)"]{color:var(--c-dim)!important;}
  [data-theme="dark"] [style*="color:var(--c-dim)"]{color:var(--c-dim)!important;}
  [data-theme="dark"] [style*="color:oklch(0.4 0.03 264)"]{color:var(--c-dim)!important;}
  [data-theme="dark"] [style*="color:var(--c-dim)"]{color:var(--c-dim)!important;}
  [data-theme="dark"] [style*="color:oklch(0.26 0.03 264)"]{color:var(--c-text)!important;}
  [data-theme="dark"] [style*="border:1px solid var(--c-border)"]{border-color:var(--c-border)!important;}
  [data-theme="dark"] [style*="border:1.5px solid var(--c-border-in)"]{border-color:var(--c-border-in)!important;}
  [data-theme="dark"] [style*="border:2px solid oklch(0.91 0.01 256)"]{border-color:var(--c-border)!important;}
  [data-theme="dark"] [style*="border:1px solid oklch(0.88"]{border-color:var(--c-border)!important;}
  [data-theme="dark"] [style*="border:1px solid oklch(0.82"]{border-color:var(--c-border)!important;}
  [data-theme="dark"] [style*="border:1px solid oklch(0.89"]{border-color:var(--c-border)!important;}
  [data-theme="dark"] [style*="background:oklch(0.97"]{background:var(--c-subtle-bg)!important;}
  [data-theme="dark"] [style*="background:var(--c-hover)"]{background:var(--c-hover)!important;}
  [data-theme="dark"] [style*="background:var(--c-hover)"]{background:var(--c-hover)!important;}
  [data-theme="dark"] [style*="background:var(--c-hover)"]{background:var(--c-hover)!important;}
  [data-theme="dark"] [style*="background:var(--c-hover)"]{background:var(--c-hover)!important;}
  [data-theme="dark"] [style*="background:oklch(0.96 0.025 266)"]{background:oklch(0.25 0.06 266)!important;}
  [data-theme="dark"] [style*="background:oklch(0.96 0.03 25)"]{background:oklch(0.22 0.04 25)!important;}
  [data-theme="dark"] [style*="background:oklch(0.968 0.008 256)"]{background:var(--c-bg)!important;}
  [data-theme="dark"] [style*="background:var(--c-hover)"]{background:oklch(0.22 0.015 264)!important;}
  [data-theme="dark"] [style*="background:oklch(0.985"]{background:var(--c-header)!important;}
  /* modal & toast */
  [data-theme="dark"] .gx-modal [style*="background:var(--c-card)"]{background:var(--c-card)!important;}
  [data-theme="dark"] [style*="background:oklch(0.2 0.03 264"]{background:oklch(0.05 0.02 264 / .7)!important;}
  /* mandat doc reste blanc pour impression */
  [data-theme="dark"] #mandat-doc,[data-theme="dark"] #mandat-doc *{background:#fff!important;color:#1a1a1a!important;border-color:#e0e0e0!important;}
  /* scrollbar dark */
  [data-theme="dark"] .gx-scroll::-webkit-scrollbar-thumb{background:oklch(0.35 0.015 264);}

  /* ===== PRINT ===== */
  @media print{
    body{background:#fff;}
    #app-root>header,#app-root>nav,#app-root .no-print,.gx-toast,.gx-modal{display:none !important;}
    main{overflow:visible !important;}
    .tab-pane{display:none !important;}
    #pane-mandat{display:block !important;padding:0 !important;}
    #pane-mandat>div{display:block !important;padding:0 !important;margin:0 !important;grid-template-columns:1fr !important;}
    #mandat-form-wrap{display:none !important;}
    #mandat-doc-wrap{display:block !important;box-shadow:none !important;border:none !important;padding:0 !important;margin:0 !important;overflow:visible !important;border-radius:0 !important;width:100% !important;}
    #mandat-doc{box-shadow:none;width:100% !important;}
    #mandat-doc .m-page{max-width:100%;padding:0;}
    #mandat-doc .m-sign{page-break-inside:avoid;}
    #mandat-doc .m-line{margin-top:28px;}
    @page{size:A4;margin:16mm;}
  }
</style>
</head>
<body>
<div id="profile-root" style="height:100%;display:none;align-items:center;overflow-y:auto;"></div>
<div id="app-root" style="height:100%;display:none;flex-direction:column;overflow:hidden;">

  <!-- HEADER + TABS (sticky ensemble) -->
  <div style="position:sticky;top:0;z-index:100;">
  <header style="background:var(--c-header);backdrop-filter:blur(16px);border-bottom:1px solid var(--c-border);padding:14px clamp(16px,4vw,40px);display:flex;align-items:center;gap:14px;">
    <div style="width:42px;height:42px;border-radius:13px;background:linear-gradient(145deg,oklch(0.56 0.16 266),oklch(0.46 0.16 272));display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;box-shadow:0 6px 16px oklch(0.5 0.16 266 / .35);flex-shrink:0;">✦</div>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:800;font-size:16px;letter-spacing:-.02em;line-height:1.1;">Générateur SMS &amp; Mail</div>
      <div style="display:flex;gap:10px;align-items:center;margin-top:1px;">
        <div id="saveStatus" style="font-size:12px;color:oklch(0.56 0.02 264);font-weight:500;"></div>
        <div id="rdvCounter" style="font-size:12px;color:oklch(0.5 0.14 155);font-weight:700;"></div>
      </div>
    </div>
    <button class="gx-press hdr-btn" id="btnProfile" style="border:1.5px solid var(--c-border-in);background:var(--c-card);color:var(--c-dim);display:flex;align-items:center;gap:7px;"><span id="profileDot" style="width:9px;height:9px;border-radius:50%;flex-shrink:0;"></span><span id="profileNameLbl"></span></button>
    <button class="gx-press" id="btnDark" title="Mode sombre" style="cursor:pointer;font-family:inherit;border:none;background:none;font-size:20px;padding:4px 6px;line-height:1;border-radius:9px;flex-shrink:0;">🌙</button>
    <button class="gx-press hdr-btn" id="btnData" style="border:none;background:oklch(0.26 0.03 264);color:#fff;box-shadow:0 4px 12px oklch(0.26 0.03 264 / .25);">💾 Données</button>
  </header>
  <nav id="tabnav" style="background:var(--c-nav);border-bottom:1px solid var(--c-border);padding:0 clamp(16px,4vw,40px);display:flex;gap:4px;overflow-x:auto;"></nav>
  </div>
  <div id="gh-banner-root"></div>

  <main class="gx-scroll" style="flex:1;overflow-y:auto;">
    <div id="pane-generate" class="tab-pane"></div>
    <div id="pane-history" class="tab-pane"></div>
    <div id="pane-stats" class="tab-pane"></div>
    <div id="pane-templates" class="tab-pane"></div>
    <div id="pane-config" class="tab-pane"></div>
    <div id="pane-agenda" class="tab-pane"></div>
    <div id="pane-mandat" class="tab-pane"></div>
    <div id="pane-mandats" class="tab-pane"></div>
    <div id="pane-orientations" class="tab-pane"></div>
  </main>

  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <div id="stat-tooltip"></div>
</div>

<script>
"use strict";

/* ============================== HELPERS ============================== */
function el(tag, attrs, children){
  const e=document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==="style") e.style.cssText=attrs[k];
    else if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")&&typeof attrs[k]==="function") e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(attrs[k]===true) e.setAttribute(k,"");
    else if(attrs[k]!==false&&attrs[k]!=null) e.setAttribute(k,attrs[k]);
  }
  if(children!=null){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  return e;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}

/* ============================== DEFAULTS ============================== */
var DEFAULT_CMS=[
  {id:1,nom:"Fumel",adresse:"Centre Médico-Social de Fumel - 2 Place Voltaire, 47500 FUMEL"},
  {id:2,nom:"Marmande",adresse:"Centre Médico-Social de Marmande - 8 Square de Verdun, 47200 MARMANDE"},
  {id:3,nom:"Saint Pardoux-d'Isaac",adresse:"Centre Médico-Social de Saint Pardoux-d'Isaac - 25 avenue de Paris, 47800 ST-PARDOUX-ISAAC"},
  {id:4,nom:"Villeneuve-Sur-Lot",adresse:"Centre Médico-Social de Villeneuve-Sur-Lot - 1 Place d'Aquitaine, 47300 VILLENEUVE-SUR-LOT"},
  {id:5,nom:"Agen Montanou",adresse:"Centre Médico-Social Agen Montanou - Rue Blaise de Monluc, Place de quartier, 47000 AGEN"},
];
var DEM_THEMES=["🪪 Identité","👨‍👩‍👧 CAF / Aides sociales","♿ MDPH","🏖 Retraite","💼 France Travail / Emploi","🏥 Santé","💰 Impôts","🏠 Logement","🚗 Transport","🌍 Étrangers","💻 Numérique","📋 Divers"];
function sortThemes(arr){return arr.slice().sort(function(a,b){var ta=a.replace(/^[^\wÀ-ɏ]+/,'');var tb=b.replace(/^[^\wÀ-ɏ]+/,'');return ta.localeCompare(tb,'fr',{sensitivity:'base'});});}
var DEFAULT_DEMARCHES=[
  /* --- Identité --- */
  {id:101,theme:"🪪 Identité",nom:"Demande de Carte Nationale d'Identité",documents:["Pièce d'identité en cours de validité ou périmée depuis moins de 5 ans (en cas de renouvellement)","Justificatif de domicile de moins de 3 mois (facture EDF, eau, téléphone fixe, avis d'imposition…)","Photo d'identité récente et conforme aux normes","Acte de naissance (si première demande ou si le nom/prénom a changé)","Date et lieu de naissance des deux parents","Timbre fiscal (gratuit pour une première demande ou perte/vol avec dépôt de plainte)","Un accès à votre compte mail."]},
  {id:102,theme:"🪪 Identité",nom:"Demande de Passeport",documents:["Justificatif de domicile de moins de 3 mois","Photo d'identité récente et conforme aux normes","Acte de naissance de moins de 3 mois (si première demande)","Ancienne carte d'identité ou passeport périmé (en cas de renouvellement)","Timbre fiscal (86 € pour un adulte, 42 € pour un mineur de 15 ans et plus, 17 € pour un mineur de moins de 15 ans)","Un accès à votre compte mail."]},
  {id:103,theme:"🪪 Identité",nom:"Demande d'inscription sur les listes électorales",documents:["Pièce d'identité en cours de validité (CNI ou passeport)","Justificatif de domicile de moins de 3 mois","Un accès à votre compte mail."]},
  {id:104,theme:"🪪 Identité",nom:"Demande d'acte d'état civil (naissance, mariage, décès)",documents:["Pièce d'identité du demandeur","Lien de parenté avec la personne concernée (si acte d'un tiers)","Informations sur la personne concernée : nom, prénom, date et lieu de l'événement","Un accès à votre compte mail."]},
  {id:105,theme:"🪪 Identité",nom:"Demande de recensement citoyen",documents:["Carte Nationale d'Identité ou passeport en cours de validité","Livret de famille des parents","Justificatif de domicile","Un accès à votre compte mail."]},
  /* --- CAF / Aides sociales --- */
  {id:201,theme:"👨‍👩‍👧 CAF / Aides sociales",nom:"Demande d'allocations familiales (CAF)",documents:["Pièce d'identité","Actes de naissance des enfants","Livret de famille","Relevé d'identité bancaire (RIB)","Justificatif de domicile de moins de 3 mois","Dernier avis d'imposition","Un accès à votre compte mail."]},
  {id:202,theme:"👨‍👩‍👧 CAF / Aides sociales",nom:"Demande de RSA (Revenu de Solidarité Active)",documents:["Pièce d'identité","Justificatif de domicile de moins de 3 mois","Relevé d'identité bancaire (RIB)","Dernier avis d'imposition (ou déclaration de ressources)","Bulletins de salaire des 3 derniers mois (si salarié)","Attestation Pôle Emploi / France Travail (si demandeur d'emploi)","Numéro d'allocataire CAF (si déjà connu)","Un accès à votre compte mail."]},
  {id:203,theme:"👨‍👩‍👧 CAF / Aides sociales",nom:"Demande d'APL (Aide Personnalisée au Logement)",documents:["Pièce d'identité","Contrat de location (bail) en cours","Coordonnées du propriétaire ou de l'agence","Relevé d'identité bancaire (RIB)","Dernier avis d'imposition","Attestation de loyer ou quittances récentes","Un accès à votre compte mail."]},
  {id:204,theme:"👨‍👩‍👧 CAF / Aides sociales",nom:"Demande de Prime d'Activité",documents:["Pièce d'identité","Relevé d'identité bancaire (RIB)","Bulletins de salaire des 3 derniers mois","Dernier avis d'imposition","Justificatif de domicile de moins de 3 mois","Un accès à votre compte mail."]},
  {id:205,theme:"👨‍👩‍👧 CAF / Aides sociales",nom:"Demande de pension alimentaire (ARIPA / CAF)",documents:["Pièce d'identité","Jugement de divorce ou convention de divorce fixant la pension","Coordonnées bancaires (RIB)","Justificatif de domicile","Un accès à votre compte mail."]},
  /* --- MDPH --- */

function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){showToast('⚠️ Stockage plein. Exportez vos données !','warn');}}
/* clé cloisonnée par profil actif — pour history/permanences/cmsList/orientations et dérivés */
function pk(suffix){return 'ess-'+S.activeProfile+'-'+suffix;}
function readProfileHistory(profileId){return profileId===S.activeProfile?S.history:ls('ess-'+profileId+'-history',[]);}
function writeProfileHistory(profileId,arr){
  if(profileId===S.activeProfile){S.history=arr;lsSet(pk('history'),arr);}
  else{lsSet('ess-'+profileId+'-history',arr);}
}
/* retrouve l'index d'un item d'historique par référence, ou par clé composite (date+heure+commune+nom) pour les items agrégés d'un autre profil */
function findHistIdx(arr,item){
  var idx=arr.indexOf(item);
  if(idx!==-1)return idx;
  return arr.findIndex(function(h){return h.date===item.date&&h.heure===item.heure&&h.commune===item.commune&&(h.nom||'').toLowerCase()===(item.nom||'').toLowerCase();});
}
var _ghLastAutoPush=0;
function persist(){
  lsSet(pk('cms'),S.cmsList);lsSet('ess-demarches',S.demarches);lsSet('ess-secteurs',S.secteurs);
  lsSet('ess-templates',S.templates);lsSet('ess-custom-tpl',S.customTemplates);lsSet('ess-vars',S.customVars);

  var now=new Date().toLocaleString('fr-FR');lsSet('ess-lastSave',now);
  S.saveStatus='Sauvegardé le '+now;renderHeader();
  /* auto-backup GitHub throttlé : max 1 push toutes les 2 minutes */
  if(ghToken()){
    var nowMs=Date.now();
    if(nowMs-_ghLastAutoPush>120000){
      _ghLastAutoPush=nowMs;
      githubPush(true);
    }
  }
}

/* ============================== GITHUB BACKUP ============================== */
var GH_REPO='maswaddpt47-cmyk/sms-mail-multi';
var GH_BRANCH='main';
var GH_BACKUP_DIR='backups';
function ghToken(){return localStorage.getItem('ess-gh-token')||'';}
function ghHeaders(token){return{'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github+json'};}
/* dossier de backup cloisonné par profil : backups/<profil>/ */
function ghBackupDir(){return GH_BACKUP_DIR+'/'+S.activeProfile;}
function ghNowFile(){
  var n=new Date();
  var d=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  var h=String(n.getHours()).padStart(2,'0')+String(n.getMinutes()).padStart(2,'0');
  return ghBackupDir()+'/backup-'+d+'-'+h+'.json';
}

/* pousse un fichier daté, puis nettoie les anciens (garde GH_MAX_VERSIONS) */
function githubPush(silent,onSuccess){
  var token=ghToken();
  if(!token){if(!silent)showToast('⚠️ Token GitHub manquant — ajoutez-le dans Configuration','warn');return;}
  if(!silent)showToast('⏳ Sauvegarde GitHub en cours…','ok');
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(exportData(),null,2))));
  var file=ghNowFile();
  /* chaque backup est un nouveau fichier horodaté — pas besoin de SHA */
  fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+file+'?ref='+GH_BRANCH,{headers:ghHeaders(token)})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(existing){
      var body={message:'backup: '+new Date().toLocaleString('fr-FR'),content:content,branch:GH_BRANCH};
      if(existing&&existing.sha)body.sha=existing.sha;
      return fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+file,{method:'PUT',headers:ghHeaders(token),body:JSON.stringify(body)});
    })
    .then(function(r){
      if(!r||!r.ok){if(!silent)showToast('❌ Erreur GitHub (vérifiez le token)','err');return;}
      if(!silent)showToast('✅ Sauvegarde GitHub réussie !');
      localStorage.setItem(pk('gh-last-backup'),new Date().toISOString());
      ghCleanOldBackups(token);
      if(onSuccess)onSuccess();
    })
    .catch(function(){if(!silent)showToast('❌ Erreur réseau GitHub','err');});
}

/* restaure le backup le plus récent sur GitHub */
function ghRestoreLatest(token,onSuccess){
  ghListBackups(token,function(backups){
    if(!backups.length){showToast('❌ Aucun backup trouvé sur GitHub','err');return;}
    var latest=backups[0];
    fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+latest.path+'?ref='+GH_BRANCH,{headers:ghHeaders(token)})
      .then(function(r){if(!r.ok)throw new Error();return r.json();})
      .then(function(data){
        var json=decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
        S.importText=json;doImport();
        if(onSuccess)onSuccess();
      })
      .catch(function(){showToast('❌ Impossible de restaurer depuis GitHub','err');});
  });
}

function ghCleanOldBackups(token){
  fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+ghBackupDir()+'?ref='+GH_BRANCH,{headers:ghHeaders(token)})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(files){
      if(!Array.isArray(files))return;
      var backups=files.filter(function(f){return f.name.match(/^backup-\d{4}-\d{2}-\d{2}-\d{4}\.json$|^backup-\d{4}-\d{2}-\d{2}\.json$/);});
      backups.sort(function(a,b){return b.name.localeCompare(a.name);}); /* du plus récent au plus ancien */
      var cutoff=Date.now()-48*3600*1000;
      var toDelete=backups.slice(1).filter(function(f){ /* toujours garder le plus récent [0] */
        var m=f.name.match(/backup-(\d{4})-(\d{2})-(\d{2})(?:-(\d{2})(\d{2}))?\.json/);
        if(!m)return false;
        var d=new Date(+m[1],+m[2]-1,+m[3],m[4]?+m[4]:0,m[5]?+m[5]:0);
        return d.getTime()<cutoff;
      });
      toDelete.forEach(function(f){
        fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+f.path,{method:'DELETE',headers:ghHeaders(token),body:JSON.stringify({message:'backup: nettoyage >48h',sha:f.sha,branch:GH_BRANCH})});
      });
    }).catch(function(){});
}

/* liste les backups disponibles sur GitHub (dossier du profil actif) */
function ghListBackups(token,cb){
  fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+ghBackupDir()+'?ref='+GH_BRANCH,{headers:ghHeaders(token)})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(files){
      if(!Array.isArray(files)){cb([]);return;}
      var backups=files.filter(function(f){return f.name.match(/^backup-\d{4}-\d{2}-\d{2}(?:-\d{4})?\.json$/);});
      backups.sort(function(a,b){return b.name.localeCompare(a.name);});
      cb(backups);
    }).catch(function(){cb([]);});
}

/* restaure un fichier backup précis */
function ghRestoreFile(token,filePath){
  showToast('⏳ Restauration en cours…','ok');
  fetch('https://api.github.com/repos/'+GH_REPO+'/contents/'+filePath+'?ref='+GH_BRANCH,{headers:ghHeaders(token)})
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(data){
      var json=decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
      S.importText=json;doImport();
      showToast('✅ Restauration réussie !');
    })
    .catch(function(){showToast('❌ Impossible de restaurer ce backup','err');});
}

/* vérification silencieuse au démarrage */
function ghCheckOnStartup(){
  var token=ghToken();if(!token)return;
  var lastLocal=localStorage.getItem(pk('gh-last-backup'));
  ghListBackups(token,function(backups){
    if(!backups.length)return;
    var latest=backups[0];
    /* extraire la date du nom de fichier */
    var m=latest.name.match(/backup-(\d{4}-\d{2}-\d{2})\.json/);
    if(!m)return;
    var ghDate=m[1];
    var localDate=lastLocal?lastLocal.slice(0,10):'';
    if(ghDate>localDate){
      /* backup GitHub plus récent que notre dernier push local → proposer */
      S._ghNewerBackup={file:latest.path,date:ghDate};
      renderHeader();
    }
  });
}

/* ============================== TOAST ============================== */
function rdvCountdown(dateStr,heure){
  if(!dateStr||!heure)return'';
  var parts=heure.split(':');
  var rdv=new Date(dateStr+'T'+parts[0]+':'+parts[1]+':00');
  var diff=Math.floor((rdv.getTime()-Date.now())/1000);
  if(diff<0)return'';
  if(diff<3600){var mn=Math.floor(diff/60);return'dans '+mn+' min';}
  if(diff<86400){var h=Math.floor(diff/3600);return'dans '+h+'h';}
  var j=Math.floor(diff/86400);return'dans '+j+' j';
}
function timeAgo(tsStr){
  if(!tsStr)return'';
  /* parse "dd/mm/yyyy hh:mm:ss" ou "dd/mm/yyyy hh:mm" */
  var m=tsStr.match(/(\d{2})\/(\d{2})\/(\d{4})[^\d]+(\d{2}):(\d{2})/);
  if(!m)return'';
  var d=new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]);
  var diff=Math.floor((Date.now()-d.getTime())/1000);
  if(diff<60)return'à l\'instant';
  if(diff<3600){var mn=Math.floor(diff/60);return'il y a '+mn+' min';}
  if(diff<86400){var h=Math.floor(diff/3600);return'il y a '+h+'h';}
  if(diff<86400*7){var j=Math.floor(diff/86400);return'il y a '+j+' j';}
  return'';
}

/* ============================== TEMPLATE FILL ============================== */
function fillTemplate(tpl,v){
  var civStr=v.civilite||"";var prenomStr=v.prenom||"";var nomStr=v.nom||"";
  var fullName=[prenomStr,nomStr].filter(Boolean).join(" ");
  var greeting="";
  if(civStr&&fullName)greeting=" "+civStr+" "+fullName;
  else if(civStr&&!fullName)greeting=" "+civStr;
  else if(!civStr&&fullName)greeting=" "+fullName;
  var dateFmt=v.date?new Date(v.date).toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"}):"[date]";
  var docList=(v.documents||[]).map(function(d){return "• "+d;}).join("\n");
  var r=(tpl||"")
    .replace(/Bonjour \{civilite\} \{nom\} \{prenom\}/g,"Bonjour"+greeting)
    .replace(/Bonjour \{civilite\} \{prenom\}/g,"Bonjour"+greeting)
    .replace(/Bonjour\{civilite\} \{prenom\}/g,"Bonjour"+greeting)
    .replace(/Bonjour \{prenom\}/g,"Bonjour"+greeting)
    .replace(/Bonjour\{prenom\}/g,"Bonjour"+greeting)
    .replace(/{civilite}/g,civStr).replace(/{prenom}/g,prenomStr).replace(/{nom}/g,nomStr)
    .replace(/{prenom_nom}/g,fullName).replace(/{greeting}/g,greeting)
    .replace(/{demarche}/g,v.demarche||"[démarche]").replace(/{date}/g,dateFmt)
    .replace(/{heure}/g,v.heure||"[heure]").replace(/{adresse}/g,v.adresse||"[adresse]")
    .replace(/Si oui, pensez à apporter :\n\{documents\}/g, docList?'Si oui, pensez à apporter :\n'+docList:'')
    .replace(/Pensez à apporter :\n\{documents\}/g, docList?'Pensez à apporter :\n'+docList:'')
    .replace(/merci de prévoir les documents suivants :\n\{documents\}/g, docList?'merci de prévoir les documents suivants :\n'+docList:'')
    .replace(/{documents}/g,docList).replace(/{commune}/g,v.commune||"[commune]")
    .replace(/\n📅 Ajouter à votre calendrier : \{lienCalendrier\}/g, v.lienCalendrier ? '\n📅 Ajouter à votre calendrier : '+v.lienCalendrier : '')
    .replace(/{lienCalendrier}/g,v.lienCalendrier||"");
  for(var i=0;i<S.customVars.length;i++){var cv=S.customVars[i];if(cv.nom)r=r.replace(new RegExp("\\{"+cv.nom+"\\}","g"),cv.valeur);}
  return r.replace(/Bonjour  /g,"Bonjour ");
}

function buildCalLink(){
  if(!S.date||!S.heure)return '';
  var parts=S.heure.split(':');
  var startMin=parseInt(parts[0])*60+parseInt(parts[1]||0);
  var endMin=startMin+30;
  function fmtDT(dateStr,min){return dateStr.replace(/-/g,'')+'T'+String(Math.floor(min/60)).padStart(2,'0')+String(min%60).padStart(2,'0')+'00';}
  function fmtISO(dateStr,min){return dateStr+'T'+String(Math.floor(min/60)).padStart(2,'0')+':'+String(min%60).padStart(2,'0')+':00';}
  var start=fmtDT(S.date,startMin),end=fmtDT(S.date,endMin);
  var startISO=fmtISO(S.date,startMin),endISO=fmtISO(S.date,endMin);
  var cms=S.cmsList.find(function(c){return String(c.id)===String(S.selectedCMS);});
  var title=encodeURIComponent('RDV Conseiller Numérique'+(S.commune?' — '+S.commune:''));
  var loc=encodeURIComponent(cms?cms.adresse:S.commune||'');
  var dem=S.selectedDemarche==="__autre__"?S.demarcheAutre:((S.demarches.find(function(d){return String(d.id)===String(S.selectedDemarche);})||{}).nom||'');
  var details=encodeURIComponent(dem?'Démarche : '+dem:'');
  var googleUrl='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+start+'/'+end+'&location='+loc+'&details='+details;
  var outlookUrl='https://outlook.live.com/calendar/0/deeplink/compose?subject='+title+'&startdt='+encodeURIComponent(startISO)+'&enddt='+encodeURIComponent(endISO)+'&location='+loc+'&body='+details+'&path=%2Fcalendar%2Faction%2Fcompose&rru=addevent';
  var type=S.calendarType||'google';
  if(type==='google')return googleUrl;
  if(type==='outlook')return outlookUrl;
  /* les deux */
  return 'Google : '+googleUrl+'\nOutlook : '+outlookUrl;
}
function compute(){
  var cms=S.cmsList.find(function(c){return String(c.id)===String(S.selectedCMS);});
  var dem=S.selectedDemarche==="__autre__"?{nom:S.demarcheAutre||"Autre",documents:[]}:S.demarches.find(function(d){return String(d.id)===String(S.selectedDemarche);});
  var vars={civilite:S.civilite,prenom:S.prenom,nom:S.nom,demarche:dem?dem.nom:"[démarche]",date:S.date,heure:S.heure,adresse:cms?cms.adresse:"[adresse]",documents:dem?dem.documents:[],commune:S.commune,lienCalendrier:buildCalLink()};
  var body="",subject="";
  if(S.selectedTemplate!=="__default__"){
    var ct=S.customTemplates.find(function(t){return String(t.id)===String(S.selectedTemplate);});
    if(ct){body=fillTemplate(ct.body,vars);subject=ct.canal==="mail"?fillTemplate(ct.sujet||"",vars):"";}
  } else {
    var bk={sms:{proposition:"sms_proposition",confirmation:"sms_confirmation",sans_appel:"sms_sans_appel"},mail:{proposition:"mail_proposition",confirmation:"mail_confirmation",sans_appel:"mail_sans_appel"}};
    var sk={proposition:"mail_proposition_sujet",confirmation:"mail_confirmation_sujet",sans_appel:"mail_sans_appel_sujet"};
    var bodyKey=bk[S.channel][S.msgType];
    var tpl=S.templates[bodyKey]||DEFAULT_TEMPLATES[bodyKey]||"";
    body=fillTemplate(tpl,vars);
    if(S.channel==="mail")subject=fillTemplate(S.templates[sk[S.msgType]]||DEFAULT_TEMPLATES[sk[S.msgType]]||"",vars);
  }
  return {body:body,subject:subject,dem:dem,cms:cms};
}
function regen(){var r=compute();S.generatedBody=r.body;S.generatedSubject=r.subject;}

function canGenerate(){
  var isAutre=S.selectedDemarche==="__autre__";
  return !!(S.civilite&&S.nom&&S.selectedCMS&&S.selectedDemarche&&S.date&&S.heure&&S.commune&&(!isAutre||S.demarcheAutre));
}
function missingFields(){
  var isAutre=S.selectedDemarche==="__autre__";var m=[];
  if(!S.civilite)m.push("Civilité");if(!S.nom)m.push("Nom");if(!S.date)m.push("Date");if(!S.heure)m.push("Heure");
  if(!S.commune)m.push("CMS");if(!S.selectedCMS)m.push("Adresse");if(!S.selectedDemarche)m.push("Démarche");
  if(isAutre&&!S.demarcheAutre)m.push("Préciser la démarche");
  return m.map(function(x){return "⚠ "+x;});
}
function partsInfo(){
  var txt=S.generatedBody||"";var len=txt.length;
  var isUnicode=/[^\x00-\x7F€£¥]/.test(txt)||/[Ā-￿]/.test(txt);
  var single=isUnicode?70:160,multi=isUnicode?67:153;
  var parts=len<=single?1:Math.ceil(len/multi);
  return {len:len,parts:parts};
}

function handleGenerate(){
  if(!canGenerate())return;
  if(hasConflict(S.date,S.heure,S.commune)){
    var conf=S.history.find(function(h){return h.date===S.date&&h.heure===S.heure&&h.commune===S.commune;});

  var r=compute();var body=r.body,subject=r.subject,dem=r.dem;
  S.generatedBody=body;S.generatedSubject=subject;
  addHistory({channel:S.channel,msgType:S.msgType,body:body,subject:subject,civilite:S.civilite,prenom:S.prenom,nom:S.nom,telephone:S.telephone,demarche:dem?dem.nom:"",selectedDemarche:S.selectedDemarche,demarcheAutre:S.demarcheAutre,commune:S.commune,selectedCMS:S.selectedCMS,date:S.date,heure:S.heure,dateDemande:S.dateDemande||"",ts:new Date().toLocaleString('fr-FR')});
  showToast("✓ Message généré et enregistré");
  renderGenerate();renderHistory();renderMandat();renderAgenda();
}

function addHistory(item){
  /* doublon : même date + heure + commune + nom → remplace l'existant */
  if(item.date&&item.heure&&item.nom){
    var di=S.history.findIndex(function(h){
      return h.date===item.date&&h.heure===item.heure&&h.commune===item.commune&&(h.nom||'').toLowerCase()===(item.nom||'').toLowerCase();
    });
    if(di!==-1){S.history.splice(di,1,Object.assign({},S.history[di],item));lsSet(pk('history'),S.history);return;}
  }
  if(item.body&&!item.statut)item.statut='en_attente';
  var h=[item].concat(S.history);if(h.length>HISTORY_MAX)h.pop();
  S.history=h;lsSet(pk('history'),h);
  /* auto-backup GitHub immédiat après chaque nouveau RDV (throttlé 2 min) */
  if(ghToken()){var nowMs=Date.now();if(nowMs-_ghLastAutoPush>120000){_ghLastAutoPush=nowMs;githubPush(true);}}
  /* Rappel export tous les 5 messages */
  var since=parseInt(localStorage.getItem(pk('since-export'))||'0',10)+1;
  localStorage.setItem(pk('since-export'),since);
  if(since>0&&since%5===0)setTimeout(function(){showToast('💾 '+since+' messages non sauvegardés — pensez à exporter !','warn');},600);
}

function doCopy(text){
  return new Promise(function(resolve){
    if(!text){resolve(false);return;}
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(text).then(function(){resolve(true);},function(){fallback();});
    } else fallback();
    function fallback(){
      try{var ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;top:0;left:0;opacity:0;";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);resolve(true);}catch(e){resolve(false);}
    }
  });
}
function flashCopied(key){S.copied[key]=true;renderAll();setTimeout(function(){S.copied[key]=false;renderAll();},1800);}
function isDuplicate(nom,demarche,date){
  return S.history.some(function(h){
    return h.nom&&nom&&h.nom.toLowerCase()===nom.toLowerCase()
      &&h.demarche&&demarche&&h.demarche.toLowerCase()===demarche.toLowerCase()
      &&h.date===date;
  });
}
function copyBody(){
  var text=S.generatedBody;
  function afterCopy(ok){
    if(!ok)return;
    if(text&&(!S.history.length||S.history[0].body!==text)){
      var r=compute();var cms=S.cmsList.find(function(c){return String(c.id)===String(S.selectedCMS);});
      if(cms&&r.dem){
        if(isDuplicate(S.nom,r.dem.nom,S.date))showToast('⚠️ Doublon détecté : '+S.nom+' / '+r.dem.nom+' déjà dans l\'historique','warn');
        addHistory({channel:S.channel,msgType:S.msgType,body:text,subject:S.generatedSubject,civilite:S.civilite,prenom:S.prenom,nom:S.nom,telephone:S.telephone,demarche:r.dem.nom,selectedDemarche:S.selectedDemarche,demarcheAutre:S.demarcheAutre,commune:S.commune,selectedCMS:S.selectedCMS,date:S.date,heure:S.heure,dateDemande:S.dateDemande||'',ts:new Date().toLocaleString('fr-FR')});
      }
    }
    flashCopied('body');showToast("✓ Copié !");
  }
  /* copie enrichie : HTML avec "cliquer sur ce lien" + fallback texte brut */
  if(window.ClipboardItem&&navigator.clipboard&&navigator.clipboard.write&&window.isSecureContext){
    var html=text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>')
      .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1">cliquer sur ce lien</a>');
    navigator.clipboard.write([new ClipboardItem({
      'text/plain':new Blob([text],{type:'text/plain'}),
      'text/html':new Blob([html],{type:'text/html'})
    })]).then(function(){afterCopy(true);},function(){doCopy(text).then(afterCopy);});
  } else {
    doCopy(text).then(afterCopy);
  }
}

/* permanences */
function toLocalDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getPermanence(commune,dateStr,permList){
  permList=permList||S.permanences;
  /* cherche d'abord un jour exceptionnel pour cette date, sinon la permanence régulière */
  if(dateStr){
    var exc=permList.find(function(p){return p.commune===commune&&p.exceptDate===dateStr;});
    if(exc)return exc;
  }
  return permList.find(function(p){return p.commune===commune&&!p.exceptDate;});
}
function nextPermDate(perm){
  var d=new Date();
  var diff=(perm.jour-d.getDay()+7)%7||7;
  d.setDate(d.getDate()+diff);
  return toLocalDateStr(d);
}
function isPermDay(perm,dateStr){
  if(!dateStr||!perm)return false;
  /* parse avec T12:00 pour éviter le décalage UTC */
  return new Date(dateStr+'T12:00:00').getDay()===perm.jour;
}
function getSlots(commune,dateStr,historyList,permOverride){
  historyList=historyList||S.history;
  var perm=permOverride||getPermanence(commune,dateStr);if(!perm)return[];
  var sh=parseInt(perm.debut),sm=parseInt(perm.debut.split(':')[1]||0);
  var eh=parseInt(perm.fin),em=parseInt(perm.fin.split(':')[1]||0);
  var start=sh*60+sm,end=eh*60+em;
  /* inclure aussi les RDV hors plage horaire */
  var extraHeures=historyList.filter(function(x){return x.date===dateStr&&(x.commune===commune||!x.commune);}).map(function(x){return x.heure;});
  extraHeures.forEach(function(h){var p=h.split(':');var t=parseInt(p[0])*60+parseInt(p[1]||0);if(t<start)start=t;if(t>end)end=t;});
  var slots=[];
  for(var t=start;t<=end;t+=perm.duree){
    var hh=String(Math.floor(t/60)).padStart(2,'0'),mm=String(t%60).padStart(2,'0');
    var heure=hh+':'+mm;
    var matches=historyList.filter(function(x){return x.date===dateStr&&x.heure===heure&&(x.commune===commune||!x.commune);});
    var confirmations=matches.filter(function(x){return x.msgType==='confirmation';});
    var propositions=matches.filter(function(x){return x.msgType==='proposition';});
    var sansAppels=matches.filter(function(x){return x.msgType==='sans_appel';});
    var taken=confirmations[0]||propositions[0]||sansAppels[0]||null;
    var multiPropo=confirmations.length===0&&propositions.length>1;
    slots.push({heure:heure,taken:taken||null,multiPropo:multiPropo,allPropo:propositions});
  }
  return slots;
}
function hasConflict(date,heure,commune){
  return S.history.some(function(h){return h.date===date&&h.heure===heure&&(h.commune===commune||!h.commune);});
}
function addPerm(){
  var np=S.np;
  if(!np.commune.trim())return;
  if(S.permanences.find(function(p){return p.commune===np.commune;})){showToast('⚠️ Permanence déjà définie pour '+np.commune,'warn');return;}
  S.permanences=S.permanences.concat([{id:Date.now(),commune:np.commune.trim(),jour:parseInt(np.jour),debut:np.debut,fin:np.fin,duree:parseInt(np.duree)}]);
  S.np={commune:'',jour:4,debut:'09:00',fin:'15:00',duree:30};
  lsSet(pk('permanences'),S.permanences);renderConfig();showToast('✓ Permanence ajoutée');
}

/* ============================== RENDER: AGENDA ============================== */
function icsDate(dateStr,heureStr){
  /* dateStr=YYYY-MM-DD heureStr=HH:MM → 20260717T090000 (heure locale) */
  return (dateStr||'').replace(/-/g,'')+'T'+(heureStr||'00:00').replace(':','')+'00';
}
function exportICS(){
  var rdvs=S.history.filter(function(h){return h.date&&h.heure;});
  if(!rdvs.length){showToast('Aucun RDV à exporter','warn');return;}
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SMS-Mail//FR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  rdvs.forEach(function(h,i){
    var dtStart=icsDate(h.date,h.heure);
    /* durée 30 min par défaut */
    var parts=h.heure.split(':');var endMin=(parseInt(parts[0])*60+parseInt(parts[1]||0)+30);
    var dtEnd=icsDate(h.date,String(Math.floor(endMin/60)).padStart(2,'0')+':'+String(endMin%60).padStart(2,'0'));
    var who=[h.civilite,h.prenom,h.nom].filter(Boolean).join(' ')||'Bénéficiaire';
    var summary='RDV '+(h.commune||'')+(h.commune?' — ':'')+who;
    var desc=(h.demarche||'')+(h.telephone?'\\nTél : '+h.telephone:'')+(h.notes?'\\nNotes : '+h.notes:'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:smsmail-'+i+'-'+dtStart+'@ess');
    lines.push('DTSTART;TZID=Europe/Paris:'+dtStart);
    lines.push('DTEND;TZID=Europe/Paris:'+dtEnd);
    lines.push('SUMMARY:'+summary);
    if(desc)lines.push('DESCRIPTION:'+desc);
    if(h.commune)lines.push('LOCATION:'+h.commune);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='permanences-ess.ics';document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('✅ '+rdvs.length+' RDV exportés');
}
function importICSText(text){
  var events=text.split('BEGIN:VEVENT').slice(1);

  events.forEach(function(ev){
    var get=function(k){var m=ev.match(new RegExp(k+'[^:]*:([^\\r\\n]+)'));return m?m[1].trim():'';};

function importPlanningJson(){

}
function archiveMandat(){
  if(!S.mandatNom&&!S.mandatPrenom){showToast("Renseignez au moins un nom","warn");return;}
  var item={
    id:Date.now(),
    civilite:S.mandatCivilite,prenom:S.mandatPrenom,nom:S.mandatNom,
    commune:S.mandatCommune,num:S.mandatNum,
    structure:STRUCTURE,duree:DUREE,
    date:todayFR(),ts:new Date().toLocaleString('fr-FR')
  };
  S.mandats=[item].concat(S.mandats);
  lsSet('ess-mandats',S.mandats);
  showToast("✓ Mandat archivé");
  renderMandats();
}

function renderMandats(){
  var pane=document.getElementById('pane-mandats');clear(pane);
  var wrap=el('div',{style:"max-width:760px;margin:0 auto;padding:clamp(18px,3vw,32px) clamp(16px,4vw,40px);"});
  var head=el('div',{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"});
  head.appendChild(el('h2',{style:"margin:0;font-size:20px;font-weight:800;letter-spacing:-.02em;"},"Mandats archivés"));
  if(S.mandats.length)head.appendChild(el('button',{class:'gx-press',style:"cursor:pointer;font-family:inherit;border:1px solid oklch(0.88 0.05 25);background:var(--c-card);color:oklch(0.55 0.16 25);font-weight:600;font-size:12.5px;padding:8px 14px;border-radius:11px;",onClick:function(){if(confirm("Vider tous les mandats archivés ?")){S.mandats=[];lsSet('ess-mandats',[]);renderMandats();}}},"Vider"));
  wrap.appendChild(head);

  if(S.mandats.length===0){
    wrap.appendChild(el('div',{style:"text-align:center;padding:60px 0;color:var(--c-muted);",html:'<div style="font-size:40px;margin-bottom:10px;opacity:.5;">📄</div><div style="font-size:14px;">Aucun mandat archivé.</div>'}));
  } else {
    var list=el('div',{style:"display:flex;flex-direction:column;gap:10px;"});
    S.mandats.forEach(function(m){
      var full=[m.civilite,m.prenom,(m.nom||"").toUpperCase()].filter(Boolean).join(" ");
      var card=el('div',{class:'gx-lift',style:"background:var(--c-card);border:1px solid var(--c-border);border-radius:16px;padding:15px 17px;box-shadow:0 1px 2px oklch(0.5 0.05 264 / .04);display:flex;align-items:center;gap:12px;"});
      var info=el('div',{style:"flex:1;min-width:0;"});
      info.appendChild(el('div',{style:"font-weight:700;font-size:14px;"},full||"(sans nom)"));
      info.appendChild(el('div',{style:"font-size:12.5px;color:var(--c-subtle);margin-top:3px;"},"Aidant : "+(m.aidant||"")+(m.commune?" · "+m.commune:"")));
      info.appendChild(el('div',{style:"font-size:11.5px;color:var(--c-subtle);margin-top:2px;"},m.date+" · archivé le "+m.ts));
      card.appendChild(info);
      card.appendChild(el('button',{class:'gx-press',style:"cursor:pointer;font-family:inherit;border:none;background:oklch(0.95 0.03 266);color:oklch(0.5 0.16 266);font-weight:700;font-size:12.5px;padding:9px 14px;border-radius:11px;flex-shrink:0;",onClick:function(){regenMandat(m);}},"↻ Régénérer"));
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }
  pane.appendChild(wrap);
}
function regenMandat(m){
  S.mandatSource="";
  S.mandatCivilite=m.civilite||"";S.mandatPrenom=m.prenom||"";S.mandatNom=m.nom||"";
  S.mandatNum=m.num||"";S.mandatCommune=m.commune||"";
  S.activeTab="mandat";
  renderTabs();showActivePane();renderMandat();
}

/* ============================== ORIENTATIONS ============================== */
/* async xlsx parser using DecompressionStream (deflate-raw) */
function parseXlsxOrientationsAsync(arrayBuffer){
  return new Promise(function(resolve,reject){
    var bytes=new Uint8Array(arrayBuffer);

    /* 1. index all local file entries */
    var entries={};
    var i=0;
    while(i<bytes.length-3){
      if(bytes[i]===0x50&&bytes[i+1]===0x4B&&bytes[i+2]===0x03&&bytes[i+3]===0x04){
        var comp=bytes[i+8]|(bytes[i+9]<<8);
        var csize=(bytes[i+18])|(bytes[i+19]<<8)|(bytes[i+20]<<16)|(bytes[i+21]<<24);
        var usize=(bytes[i+22])|(bytes[i+23]<<8)|(bytes[i+24]<<16)|(bytes[i+25]<<24);
        var fnlen=(bytes[i+26])|(bytes[i+27]<<8);
        var exlen=(bytes[i+28])|(bytes[i+29]<<8);
        var fnBytes=bytes.slice(i+30,i+30+fnlen);
        var fname='';for(var fj=0;fj<fnBytes.length;fj++)fname+=String.fromCharCode(fnBytes[fj]);
        var dataStart=i+30+fnlen+exlen;
        entries[fname]={comp:comp,raw:bytes.slice(dataStart,dataStart+csize),usize:usize};
        i=dataStart+Math.max(csize,0);
      } else {i++;}
    }

    /* 2. inflate one entry (comp 8 → deflate-raw, comp 0 → store) */
    function inflateEntry(name){
      var entry=entries[name];
      if(!entry)return Promise.resolve(null);
      if(entry.comp===0){
        var buf=entry.raw.buffer.slice(entry.raw.byteOffset,entry.raw.byteOffset+entry.raw.byteLength);
        return Promise.resolve(new TextDecoder('utf-8').decode(new Uint8Array(buf)));
      }
      if(typeof DecompressionStream==='undefined'){return Promise.resolve(null);}
      try{
        var ds=new DecompressionStream('deflate-raw');
        var writer=ds.writable.getWriter();
        var reader=ds.readable.getReader();
        writer.write(entry.raw);writer.close();
        var chunks=[];
        function read(){return reader.read().then(function(r){if(r.done)return;chunks.push(r.value);return read();});}
        return read().then(function(){
          var total=chunks.reduce(function(s,c){return s+c.length;},0);
          var out=new Uint8Array(total);var off=0;
          chunks.forEach(function(c){out.set(c,off);off+=c.length;});
          return new TextDecoder('utf-8').decode(out);
        });
      }catch(ex){return Promise.resolve(null);}
    }

    /* 3. parse xml helpers */
    function xmlAttr(str,attr){var m=str.match(new RegExp(attr+'="([^"]*)"'));return m?m[1]:'';}
    function parseSharedStrings(xml){

/* ============================== DARK MODE ============================== */
function initTheme(){
  var dark=localStorage.getItem('ess-dark')==='1';
  document.documentElement.setAttribute('data-theme',dark?'dark':'');
  var btn=document.getElementById('btnDark');
  if(btn)btn.textContent=dark?'☀️':'🌙';
}
function toggleDark(){
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'');
  localStorage.setItem('ess-dark',isDark?'1':'0');
  var btn=document.getElementById('btnDark');
  if(btn)btn.textContent=isDark?'☀️':'🌙';
}

  var toAdd=DEFAULT_DEMARCHES.filter(function(d){return existingIds.indexOf(d.id)===-1;});
  if(toAdd.length){S.demarches=S.demarches.concat(toAdd);lsSet('ess-demarches',S.demarches);}
  S.secteurs=ls('ess-secteurs',DEFAULT_SECTEURS);
  S.templates=ls('ess-templates',DEFAULT_TEMPLATES);
  /* migration : forcer les templates builtin à la dernière version par défaut */
  var _tplV='v4-sms-nocal';
  if(ls('ess-tpl-version','')!==_tplV){
    S.templates=Object.assign({},DEFAULT_TEMPLATES);
    lsSet('ess-templates',S.templates);
    lsSet('ess-tpl-version',_tplV);
  }
  S.customTemplates=ls('ess-custom-tpl',DEFAULT_CUSTOM);
  S.customVars=ls('ess-vars',[]);
  S.hiddenBuiltinKeys=ls('ess-hidden',[]);
  S.history=ls(pk('history'),[]);
  S.mandats=ls('ess-mandats',[]);
  S.orientations=ls(pk('orientations'),[]);
  S.permanences=ls(pk('permanences'),DEFAULT_PERMANENCES);
  S.calendarType=ls('ess-caltype','google');
  S.agendaScope='mine';
  S.selectedCMS=last.selectedCMS||"";
  S.selectedDemarche=last.selectedDemarche||"";
  S.commune=last.commune||"";
  S.saveStatus=lastSave?('Dernière sauvegarde : '+lastSave):'Données chargées';
}
var _staticListenersBound=false;
function bindStaticListenersOnce(){
  if(_staticListenersBound)return;_staticListenersBound=true;
  document.getElementById('btnDark').addEventListener('click',toggleDark);
  document.getElementById('btnData').addEventListener('click',function(){S.modal='data';renderModal();});
  document.getElementById('btnProfile').addEventListener('click',showProfileSelect);
  document.addEventListener('keydown',function(e){
    var ctrl=e.ctrlKey||e.metaKey;
    if(ctrl&&e.key==='Enter'){e.preventDefault();if(S.generatedBody)copyBody();else if(canGenerate())handleGenerate();}
    if(ctrl&&e.shiftKey&&(e.key==='G'||e.key==='g')){e.preventDefault();if(canGenerate())handleGenerate();}
  });
}
function enterApp(){
  document.getElementById('profile-root').style.display='none';
  document.getElementById('app-root').style.display='flex';
  loadProfileData();
  regen();
  renderAll();
  initTheme();
  bindStaticListenersOnce();
  /* vérification silencieuse au démarrage */
  setTimeout(ghCheckOnStartup,2000);
}
function activateProfile(id){
  S.activeProfile=id;
  localStorage.setItem('ess-active-profile',id);
  localStorage.setItem('ess-'+id+'-lastLogin',new Date().toLocaleDateString('fr-FR'));
  enterApp();
}
function init(){
  var active=localStorage.getItem('ess-active-profile');
  if(active&&PROFILES.some(function(p){return p.id===active;})){
    S.activeProfile=active;
    enterApp();
  } else {
    showProfileSelect();
  }
}
/* appliquer le thème avant le rendu pour éviter le flash */
(function(){var d=localStorage.getItem('ess-dark')==='1';document.documentElement.setAttribute('data-theme',d?'dark':'');})();
document.addEventListener('DOMContentLoaded',init);
</script>
